name: Smoke runtime tasks (manual)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke-runtime-tasks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sandbox image
        run: make build-sandbox-image
      - name: Runtime smoke (requires secrets)
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_AUTH_TOKEN}" ] || [ -z "${OPENAI_API_KEY}" ]; then
            echo "Skipping runtime smoke: ANTHROPIC_AUTH_TOKEN and OPENAI_API_KEY secrets are required."
            exit 0
          fi
          scripts/with-pentestd-live.sh make smoke-runtime-tasks
