name: Publish Sandbox Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Sandbox image tag to publish
        required: true
        default: latest
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sandbox-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: false

jobs:
  publish-sandbox-image:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - id: image
        name: Resolve GHCR image name
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}-sandbox" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${image_name}" >> "${GITHUB_OUTPUT}"
      - id: platform
        name: Resolve platform artifact name
        run: echo "artifact_name=${PLATFORM//\//-}" >> "${GITHUB_OUTPUT}"
        env:
          PLATFORM: ${{ matrix.platform }}
      - name: Free disk space for sandbox image
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=CyberPenda pentest sandbox
            org.opencontainers.image.description=Kali-based sandbox image for CyberPenda runtime tasks
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/pentest-sandbox/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.image.outputs.name }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export image digest
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "Build did not produce an image digest" >&2
            exit 1
          fi
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${DIGEST#sha256:}"
          touch "${RUNNER_TEMP}/digests/${digest}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@v7
        with:
          name: sandbox-image-digest-${{ steps.platform.outputs.artifact_name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-sandbox-manifest:
    needs: publish-sandbox-image
    runs-on: ubuntu-latest
    steps:
      - id: image
        name: Resolve GHCR image name
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}-sandbox" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${image_name}" >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: sandbox-image-digest-*
          merge-multiple: true
      - name: Publish multi-arch sandbox image
        run: |
          set -euo pipefail

          tag_args=()
          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              tag_args+=("-t" "${tag}")
            fi
          done <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS

          digest_args=()
          for digest_file in "${RUNNER_TEMP}"/digests/*; do
            if [ -f "${digest_file}" ]; then
              digest_args+=("${IMAGE}@sha256:$(basename "${digest_file}")")
            fi
          done

          if [ "${#digest_args[@]}" -eq 0 ]; then
            echo "No image digests were downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
        env:
          IMAGE: ${{ steps.image.outputs.name }}
