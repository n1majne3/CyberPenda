name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build embedded UI
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          rm -rf internal/daemon/webfs/dist
          cp -r web/dist internal/daemon/webfs/dist
      - name: Build release binaries
        run: scripts/build-release-binaries.sh "${GITHUB_REF_NAME}" dist/release
      - uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/release/*
          if-no-files-found: error

  publish-release:
    needs: build-release-binaries
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist/release
      - name: Publish GitHub Release
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* --verify-tag --generate-notes
          fi

  publish-app-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: image
        name: Resolve GHCR image name
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${image_name}" >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CyberPenda
            org.opencontainers.image.description=Local-first pentest agent daemon with embedded web UI
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/pentestd/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ github.ref_name }}
