name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build embedded UI
        run: |
          cd web
          npm ci
          npm run build
          cd ..
          rm -rf internal/daemon/webfs/dist
          cp -r web/dist internal/daemon/webfs/dist
      - name: Build release binaries
        run: scripts/build-release-binaries.sh "${GITHUB_REF_NAME}" dist/release
      - uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/release/*
          if-no-files-found: error

  publish-release:
    needs: build-release-binaries
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist/release
      - name: Publish GitHub Release
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* --verify-tag --generate-notes
          fi

  publish-app-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: image
        name: Resolve GHCR image name
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${image_name}" >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CyberPenda
            org.opencontainers.image.description=Local-first pentest agent daemon with embedded web UI
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/pentestd/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ github.ref_name }}

  publish-sandbox-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@v7
      - id: image
        name: Resolve GHCR image name
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}-sandbox" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${image_name}" >> "${GITHUB_OUTPUT}"
      - id: platform
        name: Resolve platform artifact name
        run: echo "artifact_name=${PLATFORM//\//-}" >> "${GITHUB_OUTPUT}"
        env:
          PLATFORM: ${{ matrix.platform }}
      - name: Free disk space for sandbox image
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=CyberPenda pentest sandbox
            org.opencontainers.image.description=Kali-based sandbox image for CyberPenda runtime tasks
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/pentest-sandbox/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.image.outputs.name }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
      - name: Export image digest
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "Build did not produce an image digest" >&2
            exit 1
          fi
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${DIGEST#sha256:}"
          touch "${RUNNER_TEMP}/digests/${digest}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@v7
        with:
          name: sandbox-image-digest-${{ steps.platform.outputs.artifact_name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-sandbox-manifest:
    needs: publish-sandbox-image
    runs-on: ubuntu-latest
    steps:
      - id: image
        name: Resolve GHCR image name
        run: |
          image_name="$(echo "${GITHUB_REPOSITORY}-sandbox" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${image_name}" >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: sandbox-image-digest-*
          merge-multiple: true
      - name: Publish multi-arch sandbox image
        run: |
          set -euo pipefail

          tag_args=()
          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              tag_args+=("-t" "${tag}")
            fi
          done <<'TAGS'
          ${{ steps.meta.outputs.tags }}
          TAGS

          digest_args=()
          for digest_file in "${RUNNER_TEMP}"/digests/*; do
            if [ -f "${digest_file}" ]; then
              digest_args+=("${IMAGE}@sha256:$(basename "${digest_file}")")
            fi
          done

          if [ "${#digest_args[@]}" -eq 0 ]; then
            echo "No image digests were downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
        env:
          IMAGE: ${{ steps.image.outputs.name }}
