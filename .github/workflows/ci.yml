name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go tests
        run: make test-ci

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Embedded UI is in sync with a fresh build
        run: make check-ui-sync

  app-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/pentestd/Dockerfile
          platforms: linux/amd64
          push: false
          tags: cyberpenda-app:ci
          build-args: |
            VERSION=ci

  sandbox-smoke-changes:
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.detect.outputs.required }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        name: Detect sandbox smoke changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BASE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE"
            head="$PR_HEAD"
          else
            base="$PUSH_BASE"
            head="$GITHUB_SHA_VALUE"
          fi
          scripts/ci-sandbox-smoke-required.sh "$base" "$head" >> "$GITHUB_OUTPUT"

  smoke-sandbox-mcp:
    needs: sandbox-smoke-changes
    if: needs.sandbox-smoke-changes.outputs.required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build sandbox image
        run: make build-sandbox-image
      - name: Smoke sandbox MCP (no LLM)
        run: scripts/with-pentestd-live.sh make smoke-sandbox-mcp
